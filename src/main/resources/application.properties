spring.application.name=online-banking-system
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── HikariCP Connection Pool ──────────────────────────────────────
# Formula: pool_size ≈ (CPU cores × 2) + effective_spindles
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.pool-name=VaultBankingPool

# ── Hibernate Performance ─────────────────────────────────────────
# Batch DML — groups INSERT/UPDATE for audit_logs, ledger_entries
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# PostgreSQL-specific prepared statement caching
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true

# ── Logging ───────────────────────────────────────────────────────
logging.level.com.onlinebanking=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
